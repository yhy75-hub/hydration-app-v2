<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ダッシュボード｜水分補給記録</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ===== PINロック ===== -->
<div id="pin-screen" class="pin-screen">
  <div class="pin-box">
    <div class="pin-icon">🔐</div>
    <div class="pin-title">管理者ログイン</div>
    <div class="pin-subtitle">管理者PINを入力してね</div>
    <div id="pin-dots" class="pin-dots">
      <span class="pin-dot"></span><span class="pin-dot"></span>
      <span class="pin-dot"></span><span class="pin-dot"></span>
    </div>
    <div id="pin-error" class="pin-error hidden">PINが違うよ、もう一度！</div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="Pin.input('1')">1</button>
      <button class="pin-key" onclick="Pin.input('2')">2</button>
      <button class="pin-key" onclick="Pin.input('3')">3</button>
      <button class="pin-key" onclick="Pin.input('4')">4</button>
      <button class="pin-key" onclick="Pin.input('5')">5</button>
      <button class="pin-key" onclick="Pin.input('6')">6</button>
      <button class="pin-key" onclick="Pin.input('7')">7</button>
      <button class="pin-key" onclick="Pin.input('8')">8</button>
      <button class="pin-key" onclick="Pin.input('9')">9</button>
      <button class="pin-key pin-key-empty"></button>
      <button class="pin-key" onclick="Pin.input('0')">0</button>
      <button class="pin-key pin-key-del" onclick="Pin.delete()">⌫</button>
    </div>
  </div>
</div>

<!-- ===== メイン ===== -->
<div id="app" class="hidden">

  <header class="header">
    <div class="header-inner">
      <div class="header-title">📊 管理者ダッシュボード</div>
      <a href="index.html" class="header-link">← 記録画面</a>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" onclick="Admin.switchTab('week', this)">週次ビュー</button>
    <button class="tab-btn" onclick="Admin.switchTab('day', this)">日次ビュー</button>
    <button class="tab-btn" onclick="Admin.switchTab('trend', this)">📈 トレンド</button>
    <button class="tab-btn" onclick="Admin.switchTab('holidays', this)">📅 休日</button>
  </nav>

  <div id="admin-dept-filter" class="admin-dept-filter"></div>

  <div class="admin-notify-bar">
    <span id="admin-notify-status">🔔 未記録アラートを受け取るにはこの端末を登録してね</span>
    <button class="admin-notify-btn" onclick="Admin.registerNotification()">通知を受け取る</button>
  </div>

  <main class="main">

    <!-- 週次ビュー -->
    <section id="tab-week" class="tab-content active">
      <div class="toolbar">
        <button class="nav-btn" onclick="Admin.prevWeek()">◀</button>
        <span id="week-label" class="week-label"></span>
        <button class="nav-btn" onclick="Admin.nextWeek()">▶</button>
        <button class="today-btn" onclick="Admin.goToThisWeek()">今週</button>
        <button class="csv-btn" onclick="Admin.downloadWeekCsv()">⬇ CSV</button>
      </div>
      <div class="legend">
        <span class="leg-item"><span class="badge badge-ok">3</span> 記録あり（件数）</span>
        <span class="leg-item"><span class="badge badge-none">-</span> 未記録</span>
        <span class="leg-item"><span class="badge badge-off">休</span> 休日</span>
      </div>
      <div class="table-wrap">
        <table id="week-table" class="week-table">
          <thead><tr id="week-header"></tr></thead>
          <tbody id="week-body"></tbody>
        </table>
      </div>
      <div class="summary-cards" id="summary-cards"></div>
    </section>

    <!-- 日次ビュー -->
    <section id="tab-day" class="tab-content">
      <div class="toolbar">
        <button class="nav-btn" onclick="Admin.prevDay()">◀</button>
        <input type="date" id="day-picker" class="day-picker" onchange="Admin.loadDay()">
        <button class="nav-btn" onclick="Admin.nextDay()">▶</button>
        <button class="today-btn" onclick="Admin.goToToday()">今日</button>
        <button class="csv-btn" onclick="Admin.downloadDayCsv()">⬇ CSV</button>
      </div>
      <div id="day-wbgt" class="day-wbgt-bar"></div>
      <div class="member-filter" id="member-filter"></div>
      <div id="day-summary" class="day-summary"></div>
      <div class="table-wrap">
        <table class="day-table">
          <thead><tr><th>時刻</th><th>名前</th><th>部署</th><th>体調</th><th>コメント</th></tr></thead>
          <tbody id="day-body"></tbody>
        </table>
      </div>
    </section>

    <!-- 休日管理 -->
    <section id="tab-holidays" class="tab-content">
      <div class="card" style="margin:16px">
        <div class="card-label" style="margin-bottom:12px">📅 休日を追加</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
          <div>
            <div style="font-size:.78rem;color:var(--sub);margin-bottom:4px">日付</div>
            <input type="date" id="holiday-input-date" class="holiday-input-date">
          </div>
          <div>
            <div style="font-size:.78rem;color:var(--sub);margin-bottom:4px">区分</div>
            <select id="holiday-input-type" class="holiday-input-type">
              <option>祝日</option>
              <option>会社休日</option>
              <option>夏季休暇</option>
              <option>年末年始</option>
              <option>その他</option>
            </select>
          </div>
          <div style="flex:1;min-width:120px">
            <div style="font-size:.78rem;color:var(--sub);margin-bottom:4px">メモ（任意）</div>
            <input type="text" id="holiday-input-memo" class="holiday-input-memo" placeholder="例：元日">
          </div>
          <button class="btn-holiday-add" onclick="Admin.addHoliday()">追加</button>
        </div>
      </div>
      <div class="card" style="margin:0 16px 16px">
        <div class="card-label" style="margin-bottom:12px">登録済み休日</div>
        <div id="holiday-list" class="holiday-list">読み込み中...</div>
      </div>
    </section>

    <!-- トレンド -->
    <section id="tab-trend" class="tab-content">
      <div class="trend-header">
        <span id="trend-week-label" class="week-label"></span>
        <div style="display:flex;gap:6px">
          <button class="nav-btn" onclick="Admin.prevWeek()">◀</button>
          <button class="nav-btn" onclick="Admin.nextWeek()">▶</button>
          <button class="today-btn" onclick="Admin.goToThisWeek()">今週</button>
        </div>
      </div>
      <div id="trend-chart" class="trend-chart"></div>
      <div id="trend-legend" class="trend-legend"></div>
      <div id="trend-summary" class="trend-summary"></div>
    </section>

  </main>
</div>

<!-- 詳細モーダル -->
<div id="modal" class="modal-overlay hidden" onclick="Admin.closeModal(event)">
  <div class="modal">
    <div id="modal-title" class="modal-title"></div>
    <table class="day-table">
      <thead><tr><th>時刻</th><th>名前</th><th>部署</th><th>体調</th><th>コメント</th></tr></thead>
      <tbody id="modal-body"></tbody>
    </table>
    <button class="modal-close" onclick="Admin.closeModal()">閉じる</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="admin.js"></script>
</body>
</html>
